name: cloud_env
description: Cloud Security Fixer Environment

entrypoint:
  module: server
  object: app

tasks:
  - id: easy
    description: Fix public S3 bucket
    grader: env.graders:grade_easy

  - id: medium
    description: Close open SSH port
    grader: env.graders:grade_medium

  - id: hard
    description: Fix IAM privilege escalation
    grader: env.graders:grade_hard